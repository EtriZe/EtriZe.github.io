<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #111; overflow: hidden; }

    #unity-container {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    #unity-canvas {
      width: 100%;
      height: 100%;
    }

    #loading-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #111;
      color: #fff;
      font-family: sans-serif;
      gap: 16px;
      transition: opacity 0.5s;
    }

    #progress-bar-bg {
      width: 300px;
      height: 8px;
      background: #333;
      border-radius: 4px;
      overflow: hidden;
    }

    #progress-bar {
      height: 100%;
      width: 0%;
      background: #e63946;
      border-radius: 4px;
      transition: width 0.2s ease;
    }
  </style>
</head>
<body>
  <div id="unity-container">
    <canvas id="unity-canvas"></canvas>
    <div id="loading-overlay">
      <span>Chargement du jeu...</span>
      <div id="progress-bar-bg">
        <div id="progress-bar"></div>
      </div>
    </div>
  </div>

  <!-- ⚠️ Remplace "BUILD_NAME" par le nom exact de tes fichiers Unity -->
  <script src="Build/AnExplosiveDay.loader.js"></script>
  <script>
    const BUILD_NAME = "AnExplosiveDay"; // ex: "an-explosive-day"

    createUnityInstance(document.getElementById("unity-canvas"), {
      dataUrl:        `Build/${BUILD_NAME}.data`,
      frameworkUrl:   `Build/${BUILD_NAME}.framework.js`,
      codeUrl:        `Build/${BUILD_NAME}.wasm`,
      streamingAssetsUrl: "StreamingAssets",
      companyName:    "EtriZe",
      productName:    "An Explosive Day",
      productVersion: "1.0",
    },
    (progress) => {
      document.getElementById("progress-bar").style.width = `${progress * 100}%`;
    })
    .then(() => {
      const overlay = document.getElementById("loading-overlay");
      overlay.style.opacity = "0";
      setTimeout(() => overlay.remove(), 500);
    })
    .catch((err) => {
      console.error("Unity failed to load:", err);
    });
  </script>
</body>
</html>
